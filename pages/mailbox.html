<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón de Mensajes | Lesly</title>
    
    <!-- CSS Globales y de Componentes -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <!-- CSS Específico de Página -->
    <link rel="stylesheet" href="../css/pages/mailbox.css">
    <style>
        .pink-code {
            color: #ff69b4 !important;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 1px dashed #ff69b4;
            padding: 2px 5px;
            transition: 0.3s;
        }
        .pink-code:hover {
            background: rgba(255, 105, 180, 0.1);
            border-radius: 4px;
        }
        .blue-link {
            color: #007bff !important;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
            display: inline-block;
            margin-top: 10px;
        }
        .blue-link:hover {
            border-bottom-color: #007bff;
            filter: brightness(1.2);
        }
        /* Forzar altura fija para evitar saltos */
        .mail-text {
            height: 280px !important;
            max-height: 280px !important;
            overflow-y: auto !important;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        .mail-viewer {
            min-height: 550px !important;
        }
    </style>
</head>
<body class="sakura-theme">

    <video autoplay muted loop id="bg-video">
        <source src="https://fastcdn.hoyoverse.com/content-v2/hk4e/121081/4f21d6f5f902640f065a6c17f9b8417c_4732158882042733475.mp4" type="video/mp4">
    </video>

    <header class="universal-header">
        <div class="brand">
            <span class="birthday-cake" onclick="createBalloons()" style="cursor: pointer; font-size: 1.8rem; margin-right: 10px; transition: transform 0.3s ease; display: inline-block;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🎂</span>
            <span>Cumpleaños de Lesly</span>
        </div>
        <nav class="nav-links">
            <a href="../lesly.html">ARCHIVO</a>
            <a href="mailbox.html" class="active">BUZÓN</a>
            <a href="game.html">PRUEBA</a>
            <a href="redeem.html">CANJEAR</a>
            <a href="../index.html" class="btn-exit">SALIR</a>
        </nav>
    </header>

    <main class="main-wrapper">
        <div class="mailbox-container">
            <!-- Lista de Mensajes -->
            <aside class="mail-list">
                <div class="list-header">CORREO (10)</div>
                <div id="mail-list-items" class="items-scroll">
                    <!-- Los items se generarán con JS -->
                </div>
            </aside>

            <!-- Visualizador de Mensajes -->
            <section class="mail-viewer">
                <div id="empty-view">
                    <img src="https://upload-static.hoyoverse.com/hk4e/upload/web/m2021071415053096500.png" width="80" style="margin-bottom: 20px;">
                    <p style="font-family: var(--font-title); letter-spacing: 2px;">Selecciona un mensaje para leerlo</p>
                </div>

                <div id="content-view">
                    <div class="mail-header">
                        <h2 id="mail-subject" class="mail-title"></h2>
                        <span id="mail-sender" class="mail-sender"></span>
                    </div>
                    <div id="mail-text" class="mail-text"></div>
                    
                    <div class="reward-box">
                        <span style="font-size: 0.8rem; color: #666;">Objeto adjunto:</span>
                        <div class="icon-box" id="mail-reward-icon"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/sounds.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const mails = [
            { subject: "¡Feliz Cumpleaños! 🐱🎂", sender: "Josue", text: "¡Feliz día Lesly! Espero que tengas un cumpleaños maravilloso lleno de alegría. He preparado este rincón digital para ti con mucho cariño. ¡Disfruta de tus regalos!\n\nCódigo especial: LESLY-GIFT-2026", reward: "🎁" },
            { subject: "Un Nuevo Año de Ejecución", sender: "Arlecchino", text: "Lesly, has demostrado ser una pieza valiosa en nuestra familia. Hoy no es un día para cenizas, sino para que tu fuego brille con más fuerza. Mantente firme y decidida.\n\nFirma: Padre.", reward: "🔥" },
            { subject: "¡PAIMON TIENE HAMBRE!", sender: "Paimon", text: "¡Oye, Lesly! ¡Feliz cumpleaños! Paimon escuchó que hay una fiesta y Paimon quiere saber... ¿Habrá mucho pastel? ¡Paimon puede comerse tres porciones ella sola!", reward: "🍰" },
            { subject: "Bajo la Luz de la Luna", sender: "Raiden Shogun", text: "La eternidad es un concepto difícil de alcanzar, pero momentos como este son los que le dan sentido. Que tu luz brille tanto como el rayo en Inazuma. Feliz cumpleaños.", reward: "⚡" },
            { subject: "¡Una Celebración Magnífica!", sender: "Furina", text: "¡Damas y caballeros! ¡Hoy celebramos el nacimiento de una estrella! Lesly, querida, que tu vida sea un escenario lleno de aplausos y alegrías. ¡Bravo!", reward: "🎭" },
            { subject: "Un Brindis por la Amistad", sender: "Navia", text: "¡Hola compañera! He traído los mejores macarons de la ciudad para celebrar tu día. ¡Que nunca te falte una sonrisa ni un buen paraguas contra las penas!", reward: "🧁" },
            { subject: "Reporte de Seguridad: Festivo", sender: "Wriothesley", text: "Todo está tranquilo en el Fuerte Merópide hoy. Me he tomado la libertad de enviarte un té especial de mi reserva privada. Disfrútalo, te lo has ganado.", reward: "☕" },
            { subject: "Duelo de Cumpleaños", sender: "Clorinde", text: "Mi espada está lista para proteger tu felicidad hoy. Que este año sea una victoria tras otra. Felicidades por un año más de vida.", reward: "🗡️" },
            { subject: "¡Nuevos Horizontes!", sender: "Nefer", text: "¡Feliz cumple, Lesly! Te deseo lo mejor en este nuevo 'nivel' de vida. ¡Disfruta mucho de tu día y que todos tus deseos se cumplan!", reward: "✨" },
            { subject: "Sabiduría y Sueños", sender: "Nahida", text: "Incluso el árbol más grande comenzó como una pequeña semilla. Que tus sueños sigan creciendo y llenando el mundo de sabiduría. ¡Feliz día!", reward: "🍀" }
        ];

        function initMailbox() {
            const list = document.getElementById('mail-list-items');
            list.innerHTML = "";
            mails.forEach((mail, index) => {
                const item = document.createElement('div');
                item.className = "mail-item";
                item.innerHTML = `
                    <h4>${mail.subject}</h4>
                    <p>De: ${mail.sender}</p>
                `;
                item.onclick = () => selectMail(index, item);
                list.appendChild(item);
            });
        }

        function selectMail(index, element) {
            // Deseleccionar anteriores
            document.querySelectorAll('.mail-item').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');

            const mail = mails[index];
            const contentView = document.getElementById('content-view');
            const emptyView = document.getElementById('empty-view');

            emptyView.style.display = 'none';
            contentView.style.display = 'flex';
            
            document.getElementById('mail-subject').innerText = mail.subject;
            document.getElementById('mail-sender').innerText = `De: ${mail.sender}`;
            
            // Lógica especial para el mensaje de Josue
            let bodyText = mail.text;
            if (mail.sender === "Josue") {
                bodyText = bodyText.replace("LESLY-GIFT-2026", `<span class="pink-code" onclick="copyMailCode('LESLY-GIFT-2026')">LESLY-GIFT-2026</span>`);
                bodyText += `<br><br><a href="redeem.html" class="blue-link">podras cajearlo en la tienda</a>`;
                document.getElementById('mail-text').innerHTML = bodyText;
            } else {
                document.getElementById('mail-text').innerText = mail.text;
            }

            document.getElementById('mail-reward-icon').innerText = mail.reward;

            if(window.SoundManager) SoundManager.play('click');
        }

        function copyMailCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                // Pequeño feedback visual
                const el = event.target;
                const originalText = el.innerText;
                el.innerText = "¡COPIADO!";
                setTimeout(() => el.innerText = originalText, 1500);
                if(window.SoundManager) SoundManager.play('click');
            });
        }

        window.onload = initMailbox;
    </script>
</body>
</html>
