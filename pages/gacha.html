<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Destino se Manifiesta... | Lesly</title>
    
    <!-- CSS Globales -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <!-- CSS Específico -->
    <link rel="stylesheet" href="../css/pages/gacha.css">
</head>
<body>

    <div id="flash-white"></div>

    <div class="wish-container" id="initial-ui">
        <h1 class="wish-title">TU DESTINO</h1>
        <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
            <button class="btn-main wish-button" onclick="startWish()">Pedir Deseo</button>
            <button id="fullscreen-btn" onclick="toggleFullscreen()" style="background: rgba(255,255,255,0.1); border: 1px solid var(--color-gold); color: var(--color-gold); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: var(--font-main); font-size: 0.8rem; letter-spacing: 2px;">
                📺 MODO CINE (FULLSCREEN)
            </button>
        </div>
    </div>

    <div id="birthday-overlay">
        <div class="intervention-box">
            <h2 class="intervention-title">¡ANOMALÍA DETECTADA!</h2>
            <div id="typed-intervention"></div>
            <button id="reclaim-btn" onclick="triggerReversal()">RECLAMAR BENDICIÓN</button>
        </div>
    </div>

    <div id="retry-overlay" style="display: none; position: fixed; inset: 0; background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, rgba(0, 0, 0, 0.9) 80%); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: revealBlur 1s forwards;">
        <div class="retry-box" style="padding: 40px; border: 2px solid var(--color-gold); border-radius: 20px; box-shadow: 0 0 50px var(--glow-red); background: var(--bg-card); position: relative; overflow: hidden;">
            <div class="aura" style="position: absolute; inset: 0; background: radial-gradient(circle, var(--color-gold) 0%, transparent 70%); opacity: 0.2; animation: pulse 2s infinite;"></div>
            <h2 style="font-family: var(--font-title); color: var(--color-gold); font-size: 2rem; margin-bottom: 20px; letter-spacing: 5px;">DESTINO REESCRITO</h2>
            <p style="margin-bottom: 30px; opacity: 0.8; font-size: 1.1rem;">La energía carmesí ha purificado tu deseo...</p>
            <button class="btn-main" onclick="finalInspiration()" style="background: linear-gradient(45deg, var(--color-gold), #fff, var(--color-gold)); color: #000; font-weight: bold; border: none; padding: 20px 50px; font-size: 1.2rem; box-shadow: 0 0 30px var(--color-gold); cursor: pointer; border-radius: 50px; transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 0 50px var(--color-gold)';" onmouseout="this.style.transform='scale(1)';">
                ✨ REINTENTAR DESTINO ✨
            </button>
        </div>
    </div>

    <!-- Contenedor de Video Optimizado -->
    <video id="gacha-video" playsinline preload="auto">
        <source id="video-source-webm" src="" type="video/webm">
        <source id="video-source-mp4" src="" type="video/mp4">
    </video>

    <script src="../js/sounds.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const video = document.getElementById('gacha-video');
        const sourceWebm = document.getElementById('video-source-webm');
        const sourceMp4 = document.getElementById('video-source-mp4');
        
        const initialUi = document.getElementById('initial-ui');
        const overlay = document.getElementById('birthday-overlay');
        const reclaimBtn = document.getElementById('reclaim-btn');
        const flash = document.getElementById('flash-white');

        let isReversing = false;

        // Función para cambiar el video dinámicamente con ambos formatos
        function setVideoSources(name) {
            sourceWebm.src = `../${name}.webm`;
            sourceMp4.src = `../${name}.mp4`;
            video.load();
        }

        function startWish() {
            // Detener el motor de partículas para liberar recursos
            const ambientCanvas = document.getElementById('ambient-fx');
            if (ambientCanvas) ambientCanvas.style.display = 'none';
            
            setVideoSources('4');
            
            video.play().then(() => {
                initialUi.style.display = 'none';
                video.style.display = 'block';
                // Si el video está silenciado, reproducimos el audio externamente
                if (window.SoundManager) SoundManager.play('wish4');
            }).catch(error => {
                console.error("Video play error:", error);
                // Si falla, intentamos solo con el mp4 por si acaso
                video.src = '../4.mp4';
                video.play();
            });
        }

        video.onended = () => {
            if (!isReversing) {
                video.style.display = 'none';
                overlay.style.display = 'flex';
                startInterventionTyping();
            } else {
                // Si terminamos el video de reversión, mostramos el botón de reintento
                if (sourceWebm.src.includes('4revertido') || sourceMp4.src.includes('4revertido')) {
                    video.style.display = 'none';
                    document.getElementById('retry-overlay').style.display = 'flex';
                    if (window.SoundManager) SoundManager.play('alert');
                } else {
                    // Si ya es el video de 5 estrellas, terminamos
                    finishGacha();
                }
            }
        };

        function finalInspiration() {
            document.getElementById('retry-overlay').style.display = 'none';
            video.style.display = 'block';
            setVideoSources('5');
            video.play().then(() => {
                if (window.SoundManager) SoundManager.play('wish5');
            }).catch(e => console.log("Error en deseo final:", e));
        }

        function startInterventionTyping() {
            if (window.SoundManager) SoundManager.play('alert');
            const text = "SISTEMA: Detectando firma de energía inusual... Hoy es 12 de marzo. Identidad confirmada: Lesly. Reemplazando destino ordinario por Bendición Carmesí de Cumpleaños...";
            let i = 0;
            const container = document.getElementById('typed-intervention');
            container.innerHTML = "";
            
            function type() {
                if (i < text.length) {
                    container.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 35);
                } else {
                    reclaimBtn.style.display = 'inline-block';
                }
            }
            type();
        }

        function triggerReversal() {
            overlay.style.display = 'none';
            video.style.display = 'block';
            isReversing = true;
            setVideoSources('4revertido');
            video.play().catch(e => console.log("Error en reversión:", e));
        }

        function finishGacha() {
            flash.style.opacity = '1';
            flash.style.transition = 'opacity 1s ease';
            setTimeout(() => {
                window.location.href = '../lesly.html';
            }, 1000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error al intentar modo pantalla completa: ${err.message}`);
                });
                document.getElementById('fullscreen-btn').innerText = "❌ SALIR DE PANTALLA COMPLETA";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fullscreen-btn').innerText = "📺 MODO CINE (FULLSCREEN)";
                }
            }
        }
    </script>
</body>
</html>
