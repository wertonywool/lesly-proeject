<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Recuerdos | Lesly</title>
    
    <!-- CSS Globales -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        body { background: #000; overflow-y: auto; height: auto; }
        .gallery-container {
            max-width: 1200px;
            margin: 120px auto 50px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid var(--border-soft);
            height: 350px;
            background: rgba(255,255,255,0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(5px);
        }
        .gallery-item:hover {
            transform: translateY(-10px);
            border-color: var(--color-crimson);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px var(--border-crimson);
            z-index: 10;
        }
        .gallery-item span {
            color: rgba(255,255,255,0.2);
            font-family: var(--font-title);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .page-title {
            text-align: center; 
            color: var(--color-gold); 
            font-family: var(--font-title); 
            margin-top: 100px;
            letter-spacing: 8px;
            font-size: 2.5rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="sakura-theme">

    <header class="universal-header">
        <div class="brand">
            <span class="birthday-cake" onclick="createBalloons()" style="cursor: pointer; font-size: 1.8rem; margin-right: 10px; transition: transform 0.3s ease; display: inline-block;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🎂</span>
            <span>Cumpleaños de Lesly</span>
        </div>
        <nav class="nav-links">
            <a href="../lesly.html">ARCHIVO</a>
            <a href="mailbox.html">BUZÓN</a>
            <a href="gallery.html" class="active">MULTIMEDIA</a>
            <a href="game.html">PRUEBA</a>
            <a href="redeem.html">CANJEAR</a>
            <a href="../index.html" class="btn-exit">SALIR</a>
        </nav>
    </header>
    
    <h1 class="page-title">ARCHIVO DE RECUERDOS</h1>
    
    <div class="gallery-container">
        <div class="gallery-item"><span>RECUERDO I</span></div>
        <div class="gallery-item"><span>RECUERDO II</span></div>
        <div class="gallery-item"><span>RECUERDO III</span></div>
        <div class="gallery-item"><span>RECUERDO IV</span></div>
        <div class="gallery-item"><span>RECUERDO V</span></div>
        <div class="gallery-item"><span>RECUERDO VI</span></div>
    </div>

    <script src="../js/sounds.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
