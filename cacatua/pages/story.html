<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia | Lesly</title>
    
    <!-- CSS Globales -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <!-- CSS Específico -->
    <style>
        .story-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 100px 20px;
            background: rgba(0,0,0,0.8);
        }
        .dialog-box {
            width: 100%;
            max-width: 800px;
            background: rgba(10, 10, 12, 0.95);
            border: 1px solid var(--color-gold);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .dialog-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 30px;
            overflow-y: auto;
            max-height: 350px;
            padding-right: 15px;
        }
        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }
        #skip-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        #skip-btn:hover {
            color: var(--color-crimson);
            border-color: var(--color-crimson);
            background: rgba(255, 26, 26, 0.05);
        }

        /* Pantalla de Susto / Advertencia */
        #scare-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        .scare-title {
            color: #ff1a1a;
            font-family: var(--font-title);
            font-size: 4rem;
            letter-spacing: 15px;
            animation: glitch 0.2s infinite;
            text-shadow: 2px 2px #fff;
        }
        .scare-text {
            color: #fff;
            font-size: 1.2rem;
            margin-top: 20px;
            opacity: 0.8;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        .code-reveal {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #ff1a1a;
            background: rgba(255, 26, 26, 0.1);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            animation: popIn 0.5s ease;
        }
    </style>
</head>
<body class="sakura-theme">
    
    <header class="universal-header">
        <div class="brand">
            <span class="birthday-cake" onclick="createBalloons()" style="cursor: pointer; font-size: 1.8rem; margin-right: 10px; transition: transform 0.3s ease; display: inline-block;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🎂</span>
            <span>Cumpleaños de Lesly</span>
        </div>
        <nav class="nav-links">
            <a href="../lesly.html">ARCHIVO</a>
            <a href="mailbox.html">BUZÓN</a>
            <a href="game.html">PRUEBA</a>
            <a href="redeem.html">CANJEAR</a>
            <a href="../index.html" class="btn-exit">SALIR</a>
        </nav>
    </header>

    <div id="scare-overlay">
        <h1 class="scare-title">¡EHH TE PILLÉ!</h1>
        <p class="scare-text" id="scare-msg">¿Intentando saltarte nuestra historia? Tan impaciente como siempre...</p>
        <div id="atrapada-code-container" style="display: none; flex-direction: column; align-items: center;">
            <p style="margin-top: 30px; color: #ffcc00; font-style: italic;">Perdón, no soy bueno con el texto...</p>
            <div class="code-reveal" onclick="copyAtrapadaCode()">LESLY-ATRAPADA-08</div>
            <p id="copy-hint-atrapada" style="font-size: 0.7rem; color: #ff1a1a; margin-top: 10px;">(Toca el código para copiar)</p>
            <button class="btn-main" style="margin-top: 30px;" onclick="location.href='../lesly.html'">VOLVER AL ARCHIVO</button>
        </div>
    </div>

    <main class="story-container">
        <div class="dialog-box">
            <div class="dialog-header">
                <span class="chapter-number">Capítulo I</span>
                <h2 id="story-title">El inicio de una leyenda</h2>
            </div>
            
            <div class="dialog-content">
                <p id="story-text"></p>
            </div>

            <div class="dialog-footer">
                <button id="skip-btn" onclick="triggerScare()">SALTAR</button>
                <button id="next-btn" class="btn-main" onclick="location.href='../lesly.html'" style="display: none;">Continuar...</button>
            </div>
        </div>
    </main>

    <script src="../js/sounds.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const fullText = "Josue y Lesly se conocieron jugando Genshin Impact... Fue un encuentro marcado por el destino en medio de las tierras de Teyvat. Todo empezó con una simple invitación al multijugador, y desde entonces, no hemos dejado de compartir aventuras, derrotar jefes y quemar resina juntos.\n\n" +
            "A veces me pongo a pensar en lo mucho que ha pasado desde aquel día... es increíble cómo un videojuego puede unir a las personas de esta manera. Y hablando de historias largas y complejas, creo que ha llegado el momento de contarte la historia de Five Nights at Freddy's completa... XD\n\n" +
            "Para entender la historia de Five Nights at Freddy's hay que olvidarse que estos son juegos y quiero que tomen realmente a esta saga como lo que es. ¿Terror? Sí, pero sobre todo, ciencia ficción. Antes de comenzar, quiero decir que esta cronología la realizamos entre 3 youtubers conocidos de Five Nights at Freddy's y yo. Por lo tanto, agradecería que si les gusta el contenido de este juego vayan a visitar sus canales. Ahora sí, empecemos.\n\n" +
            "¿Qué pasaría si dos amigos se abren una pizzería? Esa es la primera pregunta que hay que plantearnos. Lo normal sería que todo vaya medianamente bien con algún tipo de problemas, pero nada saldría más allá de eso. La pregunta cambia completamente si nos preguntamos ¿Qué pasaría si Henry y William abren una pizzería? ¿Quiénes son estos personajes? En un principio, grandes amigos.\n\n" +
            "Henry, por un lado, era un ferviente y talentoso mecánico que cuidaba a su única hija, Charlie. No sabemos nada de su esposa, ni siquiera si tiene a alguien más en su familia. Y por el otro lado, William Afton. La familia de Afton estaba compuesta por 5 miembros. William, una persona con mucho dinero y con buena capacidad para la mecánica. Su hija menor, Elizabeth. Este pendejo que no sabemos el nombre, pero llora todo el tiempo, así que vamos a ponerle Crying Child. Michael Afton, su hijo mayor y su esposa, de quien no se sabe nada. Estos dos personajes unieron sus capacidades de mecánicos y con el buen capital que tenía William ahorrado, entre los dos abrieron un restaurante.\n\n" +
            "Así fue como entre los años 1980 a 1982, supuestamente, Fredbear Family Dinner abrió sus puertas. La principal atracción de este lugar eran los animatrónicos. ¿Qué son? Bueno, básicamente eran robots que podrían ser controlados tanto por ellos mismos como por personas o por almas. Estos animatrónicos habían sido desarrollados por los dueños del restaurante, pero Henry destacó un poco más debido a que hizo un complejo sistema de resortes que permitía a la persona usar estos trajes. So...";

        let i = 0;
        const speed = 40;
        const textElement = document.getElementById('story-text');
        let typingActive = true;

        function typeWriter() {
            if (i < fullText.length && typingActive) {
                textElement.innerHTML += fullText.charAt(i).replace(/\n/g, '<br>');
                i++;
                const container = document.querySelector('.dialog-content');
                container.scrollTop = container.scrollHeight;
                setTimeout(typeWriter, speed);
            } else if (i >= fullText.length) {
                document.getElementById('next-btn').style.display = 'block';
                document.getElementById('skip-btn').style.display = 'none';
            }
        }

        function triggerScare() {
            typingActive = false;
            if(window.SoundManager) SoundManager.play('alert');
            
            const overlay = document.getElementById('scare-overlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('atrapada-code-container').style.display = 'flex';
                if(window.SoundManager) SoundManager.play('wish5');
            }, 2000);
        }

        function copyAtrapadaCode() {
            const code = "LESLY-ATRAPADA-08";
            navigator.clipboard.writeText(code).then(() => {
                const hint = document.getElementById('copy-hint-atrapada');
                hint.innerText = "¡CÓDIGO COPIADO!";
                hint.style.color = "#fff";
                if(window.SoundManager) SoundManager.play('click');
                setTimeout(() => {
                    hint.innerText = "(Toca el código para copiar)";
                    hint.style.color = "#ff1a1a";
                }, 2000);
            });
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
